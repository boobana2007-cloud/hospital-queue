<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏥 Hospital Emergency Queue</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#060b12;font-family:'Sora',sans-serif;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:#0d1117;}
  ::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px;}
  @keyframes slideIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:none;}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes floatUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:none;}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  @keyframes glow{0%,100%{box-shadow:0 0 20px #ff2d2d33;}50%{box-shadow:0 0 40px #ff2d2d77;}}
  button{cursor:pointer;transition:all 0.2s ease;font-family:'Sora',sans-serif;}
  button:hover{filter:brightness(1.12);}
  input:focus,select:focus{border-color:#38bdf8!important;outline:none;}
  input,select{outline:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect,useMemo } = React;

// ── MIN-HEAP ──────────────────────────────────
class MinHeap {
  constructor(){this.heap=[];}
  _parent(i){return Math.floor((i-1)/2);}
  _left(i){return 2*i+1;}
  _right(i){return 2*i+2;}
  _swap(i,j){[this.heap[i],this.heap[j]]=[this.heap[j],this.heap[i]];}
  _priority(p){return p.severity*1000+p.arrivalTime;}
  insert(patient){this.heap.push(patient);this._bubbleUp(this.heap.length-1);}
  _bubbleUp(i){
    while(i>0){
      const p=this._parent(i);
      if(this._priority(this.heap[p])>this._priority(this.heap[i])){this._swap(i,p);i=p;}
      else break;
    }
  }
extractMin(){
    if(this.heap.length===0)return null;
    if(this.heap.length===1)return this.heap.pop();
    const min=this.heap[0];this.heap[0]=this.heap.pop();this._sinkDown(0);return min;
  }
  _sinkDown(i){
    const n=this.heap.length;
    while(true){
      let s=i;const l=this._left(i),r=this._right(i);
      if(l<n&&this._priority(this.heap[l])<this._priority(this.heap[s]))s=l;
      if(r<n&&this._priority(this.heap[r])<this._priority(this.heap[s]))s=r;
      if(s!==i){this._swap(i,s);i=s;}else break;
    }
  }
  peek(){return this.heap[0]||null;}
  size(){return this.heap.length;}
  toSortedArray(){return [...this.heap].sort((a,b)=>a.severity!==b.severity?a.severity-b.severity:a.arrivalTime-b.arrivalTime);}
}

// ── CONFIG ────────────────────────────────────
const SEVERITY={
  1:{label:"Critical", color:"#ff2d2d",bg:"#3a0000",badge:"🔴",desc:"Life-threatening"},
  2:{label:"Severe",   color:"#ff6b00",bg:"#3a1500",badge:"🟠",desc:"Serious condition"},
  3:{label:"Moderate", color:"#f5c400",bg:"#2e2200",badge:"🟡",desc:"Needs attention"},
  4:{label:"Minor",    color:"#22c55e",bg:"#002210",badge:"🟢",desc:"Non-urgent"},
  5:{label:"Stable",   color:"#38bdf8",bg:"#001a2e",badge:"🔵",desc:"Observation only"},
};

const USERS=[
  {username:"admin",  password:"admin123",  role:"Administrator"},
  {username:"doctor", password:"doctor123", role:"Doctor"},
  {username:"nurse",  password:"nurse123",  role:"Nurse"},
];

let pidCounter=1, arrivalCounter=0;

// ── LOGIN PAGE ────────────────────────────────
function LoginPage({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [showPass,setShowPass]=useState(false);
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  function handleLogin(){
    if(!username.trim()||!password.trim()){setError("Please enter username and password.");return;}
    setLoading(true);setError("");
    setTimeout(()=>{
      const user=USERS.find(u=>u.username===username.trim()&&u.password===password);
      if(user){onLogin(user);}
      else{setError("Invalid username or password. Try the demo credentials below.");setLoading(false);}
    },700);
  }
  function handleKey(e){if(e.key==="Enter")handleLogin();}

  const INPUT={width:"100%",background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:10,padding:"13px 16px",color:"#e2e8f0",fontSize:14,fontFamily:"'Sora',sans-serif",display:"block",transition:"border 0.2s"};

  return(
    <div style={{minHeight:"100vh",background:"#060b12",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{position:"fixed",top:-120,right:-120,width:450,height:450,borderRadius:"50%",background:"radial-gradient(circle,#38bdf811 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:-120,left:-120,width:450,height:450,borderRadius:"50%",background:"radial-gradient(circle,#ff2d2d08 0%,transparent 70%)",pointerEvents:"none"}}/>

      <div style={{width:"100%",maxWidth:420,animation:"floatUp 0.6s ease"}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:60,marginBottom:10}}>🏥</div>
          <h1 style={{color:"#e2e8f0",fontSize:28,fontWeight:800,letterSpacing:-0.5}}>Emergency Room</h1>
          <p style={{color:"#475569",fontSize:12,fontFamily:"'DM Mono',monospace",marginTop:6,letterSpacing:1}}>QUEUE MANAGEMENT SYSTEM</p>
        </div>

        {/* Card */}
        <div style={{background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:18,padding:32,boxShadow:"0 24px 64px #00000077"}}>
          <h2 style={{color:"#64748b",fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:3,marginBottom:22,textAlign:"center"}}>STAFF LOGIN</h2>

          <label style={{color:"#64748b",fontSize:10,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6,letterSpacing:1}}>USERNAME</label>
          <input type="text" placeholder="Enter your username" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={handleKey} style={{...INPUT,marginBottom:14}}/>

          <label style={{color:"#64748b",fontSize:10,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6,letterSpacing:1}}>PASSWORD</label>
          <div style={{position:"relative",marginBottom:14}}>
            <input type={showPass?"text":"password"} placeholder="Enter your password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={handleKey} style={{...INPUT,paddingRight:50}}/>
            <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#475569",fontSize:18,padding:0,lineHeight:1}}>
              {showPass?"🙈":"👁️"}
            </button>
          </div>

          {error&&(
            <div style={{background:"#3a0000",border:"1px solid #ff2d2d44",borderRadius:8,padding:"10px 14px",marginBottom:14,color:"#ff2d2d",fontSize:12,fontFamily:"'DM Mono',monospace",animation:"fadeIn 0.3s ease"}}>
              ⚠️ {error}
            </div>
          )}

          <button onClick={handleLogin} disabled={loading} style={{width:"100%",background:loading?"#1e2a3a":"linear-gradient(135deg,#0c4a6e,#0e7490)",border:"1px solid #38bdf8",borderRadius:10,padding:"14px 0",color:"#e2e8f0",fontWeight:800,fontSize:15,marginTop:4,opacity:loading?0.7:1}}>
            {loading?"⏳  Signing in…":"🔐  Sign In"}
          </button>

          {/* Demo creds */}
          <div style={{marginTop:22,background:"#060b12",border:"1px solid #1e2a3a",borderRadius:10,padding:14}}>
< truncated lines 146-285 >
          </div>

          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <StatCard icon="🚨" label="In Queue"  value={queue.length}   color="#f5c400"/>
            <StatCard icon="🔴" label="Critical"  value={criticalCount}  color="#ff2d2d"/>
            <StatCard icon="🟠" label="Severe"    value={severeCount}    color="#ff6b00"/>
            <StatCard icon="✅" label="Treated"   value={treated.length} color="#22c55e"/>
            <StatCard icon="⏱️" label="Next"       value={heapRef.current.peek()?SEVERITY[heapRef.current.peek().severity].label:"—"} color="#38bdf8"/>
          </div>
        </div>
      </div>

      {/* BODY */}
      <div style={{maxWidth:1100,margin:"20px auto",padding:"0 16px",display:"grid",gridTemplateColumns:"1fr 300px",gap:20}}>

        {/* LEFT */}
        <div>
          <button onClick={handleTreat} style={{width:"100%",background:"#0d2a12",border:"1px solid #22c55e",color:"#22c55e",borderRadius:10,padding:"14px 0",fontWeight:700,fontSize:15,marginBottom:12}}>
            ✅  Treat Next Patient  (Extract Min from Heap)
          </button>

          {flash&&(
            <div style={{background:"#0d1117",border:1px solid ${flash.color},borderRadius:8,padding:"10px 14px",marginBottom:12,color:flash.color,fontSize:12,fontFamily:"'DM Mono',monospace",animation:"fadeIn 0.3s ease"}}>{flash.msg}</div>
          )}

          {/* QUEUE */}
          <div style={{background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:12,overflow:"hidden",marginBottom:16}}>
            <div style={{padding:"13px 16px",borderBottom:"1px solid #1e2a3a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#e2e8f0",fontWeight:700,fontSize:14}}>📋 Waiting Queue</span>
              <span style={{color:"#475569",fontSize:11,fontFamily:"'DM Mono',monospace"}}>{queue.length} patient{queue.length!==1?"s":""}</span>
            </div>
            <div style={{padding:12,maxHeight:440,overflowY:"auto"}}>
              {queue.length===0
                ?(
                  <div style={{textAlign:"center",color:"#334155",padding:"50px 0"}}>
                    <div style={{fontSize:40,marginBottom:12}}>🏥</div>
                    <div style={{fontSize:13,marginBottom:6}}>Queue is empty</div>
                    <div style={{fontSize:11,color:"#1e2a3a"}}>Admit a patient using the form on the right →</div>
                  </div>
                )
                :queue.map((p,i)=><PatientCard key={p.id+tick} patient={p} rank={i+1} isNext={i===0} tick={tick}/>)
              }
            </div>
          </div>

          {/* TREATED */}
          {treated.length>0&&(
            <div style={{background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:12,overflow:"hidden"}}>
              <div style={{padding:"13px 16px",borderBottom:"1px solid #1e2a3a"}}>
                <span style={{color:"#22c55e",fontWeight:700,fontSize:14}}>✅ Treated Patients</span>
              </div>
              <div style={{padding:12,maxHeight:250,overflowY:"auto"}}>
                {treated.map(p=>(
                  <div key={p.id+"t"} style={{background:"#001a0a",border:"1px solid #14532d",borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,animation:"fadeIn 0.3s ease"}}>
                    <div>
                      <span style={{color:"#86efac",fontWeight:600,fontSize:13}}>{p.name}</span>
                      <span style={{color:"#475569",fontSize:11,marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{p.id}</span>
                      <div style={{color:"#64748b",fontSize:11,marginTop:2}}>{p.condition}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <SeverityBadge level={p.severity}/>
                      <div style={{color:"#475569",fontSize:10,marginTop:4,fontFamily:"'DM Mono',monospace"}}>waited {p.waited} · {p.treatedAt}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* RIGHT */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>

          {/* ADMIT FORM */}
          <div style={{background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:12,padding:18}}>
            <h3 style={{color:"#e2e8f0",fontWeight:700,fontSize:14,marginBottom:14}}>➕ Admit New Patient</h3>

            <label style={LABEL}>PATIENT NAME *</label>
            <input type="text" placeholder="Full name" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} style={INPUT}/>

            <label style={LABEL}>AGE *</label>
            <input type="number" placeholder="Age" min="1" max="120" value={form.age} onChange={e=>setForm(p=>({...p,age:e.target.value}))} style={INPUT}/>

            <label style={LABEL}>CONDITION / COMPLAINT *</label>
            <input type="text" placeholder="e.g. Chest Pain, Fracture…" value={form.condition} onChange={e=>setForm(p=>({...p,condition:e.target.value}))} style={INPUT}/>

            <label style={LABEL}>SEVERITY LEVEL *</label>
            <select value={form.severity} onChange={e=>setForm(p=>({...p,severity:e.target.value}))} style={{...INPUT,color:SEVERITY[form.severity].color,border:1px solid ${SEVERITY[form.severity].color}55,marginBottom:14}}>
              {Object.entries(SEVERITY).map(([k,v])=>(
                <option key={k} value={k}>{v.badge} {k} — {v.label} ({v.desc})</option>
              ))}
            </select>

            <button onClick={handleAdmit} style={{width:"100%",background:SEVERITY[form.severity].color,border:"none",borderRadius:8,padding:"13px 0",color:"#000",fontWeight:800,fontSize:14}}>
              Admit Patient
            </button>
          </div>

          {/* SEVERITY LEGEND */}
          <div style={{background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:12,padding:16}}>
            <h3 style={{color:"#e2e8f0",fontWeight:700,fontSize:12,marginBottom:10}}>Severity Levels</h3>
            {Object.entries(SEVERITY).map(([k,v])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:k!=="5"?"1px solid #0f1923":"none"}}>
                <span style={{fontSize:15}}>{v.badge}</span>
                <div>
                  <span style={{color:v.color,fontWeight:700,fontSize:11,fontFamily:"'DM Mono',monospace"}}>{k} — {v.label}</span>
                  <div style={{color:"#475569",fontSize:10}}>{v.desc}</div>
                </div>
              </div>
            ))}
          </div>

          {/* LOG */}
          <div style={{background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"11px 14px",borderBottom:"1px solid #1e2a3a"}}>
              <span style={{color:"#e2e8f0",fontWeight:700,fontSize:12}}>📋 Activity Log</span>
            </div>
            <div style={{padding:10,maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:5}}>
              {log.map((l,i)=>(
                <div key={i} style={{display:"flex",gap:7,animation:"slideIn 0.3s ease"}}>
                  <span style={{color:"#334155",fontSize:9,fontFamily:"'DM Mono',monospace",flexShrink:0,marginTop:2}}>{l.time}</span>
                  <span style={{color:l.color,fontSize:10,fontFamily:"'DM Mono',monospace",lineHeight:1.5}}>{l.msg}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  function handleLogin(u){setUser({...u,name:u.username.charAt(0).toUpperCase()+u.username.slice(1)});}
  function handleLogout(){setUser(null);}
  if(!user)return <LoginPage onLogin={handleLogin}/>;
  return <Dashboard user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
